<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/logo.jpeg') }}">
    <title>Mate Argento - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>
<body>
<div class="contenedor">

    {% extends 'base.html' %}


    {% block content %}
    <br><br><br>
    <div class="contenedor-padre3">
        {% for p in productos %}
            <div class="tarjeta">
                <h4>{{ p.nombre }}</h4>
                <img src="{{ url_for('static', filename='img/' + p.imagen) }}" style="width: 200px;">
                <p><b>${{ p.precio }}</b></p>
                <a href="/detalle/{{ p.id }}">Ver detalle</a>
                <form action="/agregar_al_carrito/{{ p.id }}" method="GET">
                    <button type="submit" style="cursor: pointer; padding: 10px; background-color: orange; border: none; border-radius: 5px;">
                        Comprar
                    </button>
                </form>
                {% if session.get('usuario_rol') == 'admin' %}
                    <a href="/eliminar_producto/{{ p.id }}" ...>Eliminar</a>
                {% endif %}
            </div>
        {% else %}
            <p>No hay productos en esta categoría todavía.</p>
        {% endfor %}
    </div>

    <br><br>
    <a href="/">Volver al inicio</a> 

    <br>
    {% endblock %}
</div>
</body>
</html>
