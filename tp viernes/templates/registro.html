<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/logo.jpeg') }}">
    <title>Mate Argento - Registrarse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="todo-centrado">
        <div class="tarjeta" style="background-color: #CADDEE; width: 420px; height: 480px ;">

            <a href="/">
                <img src="{{ url_for('static', filename='img/logof.png') }}" style="width: 120px; height: 120px;">
            </a>

            <h2>Registrarse</h2>
    
            <form action="/registrar_usuario" method="POST">
                <label>Nombre:</label><br>
                <input type="text" name="nombre" placeholder="Tu nombre" required>
                <br><br>

                <label>Email:</label><br>
                <input type="email" name="email" placeholder="mail@ejemplo.com" required>
                <br><br>

                <label>Contraseña:</label><br>
                <input type="password" name="password" required>
                <br><br>

                <button type="submit">Crear cuenta</button>
            </form>
            <br>
            <p>¿Ya tenés cuenta? <a href="/login">Iniciá sesión acá</a></p>
            <br>
        </div>
    </div>
</body>
</html>
